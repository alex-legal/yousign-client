# Publishes @alexlegal/yousign to npm on push to main using npm Trusted
# Publishing (OIDC) — no long-lived NPM_TOKEN secret. Requires a Trusted
# Publisher to be configured for the package on npmjs.com pointing at this
# repo and the workflow filename `npm-publish.yml`.
name: Node.js Package

on:
  push:
    branches:
      - "main"

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required: lets npm mint an OIDC token for Trusted Publishing (and provenance)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/
      # Trusted Publishing needs npm >= 11.5.1; Node 22 bundles npm 10.
      - name: Upgrade npm for Trusted Publishing
        run: npm install -g npm@^11.5.1
      - name: Enable corepack (pnpm)
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify generated types
        run: pnpm run verify
      - name: Build dist
        run: pnpm run build
      # OIDC-based publish: npm detects the Actions environment and exchanges a
      # short-lived credential automatically — no auth secret in the env.
      # Provenance is generated automatically.
      - name: Publish
        run: npm publish --access public
