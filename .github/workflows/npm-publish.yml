# Publishes @alexlegal/yousign to npm on push to main.
name: Node.js Package

on:
  push:
    branches:
      - "main"

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/
      - name: Enable corepack (pnpm)
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify generated types
        run: pnpm run verify
      - name: Build dist
        run: pnpm run build
      # Diagnostic: fail early with a clear auth error instead of npm's cryptic
      # E404 if the NPM_TOKEN secret is expired/revoked or lacks publish rights.
      - name: Check npm auth
        run: npm whoami --registry https://registry.npmjs.org/
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
